version: "3.1"

intents:
  - greet
  - goodbye
  - motivational
  - inspirational
  - success
  - funny
  - affirm
  - deny

responses:

  utter_greet:
    - text: "Hello! 👋 How can I help you today?"

  utter_goodbye:
    - text: "Goodbye! Have a great day 😊"

  utter_thanks:
    - text: "Thanks for your feedback 👍 If you want more quotes please mention the type."

  utter_sorry:
    - text: "Sorry about that. Try another category of quotes."

actions:
  - action_motivational_quote
  - action_inspirational_quote
  - action_success_quote
  - action_funny_quote

session_config:
  session_expiration_time: 60
  carry_over_slots_to_new_session: true