version: "3.1"

intents:
  - greet
  - goodbye
  - ask_motivation
  - ask_inspiration
  - ask_success
  - ask_funny

responses:
  utter_greet:
    - text: "Hello! 👋 How can I help you today?"

  utter_goodbye:
    - text: "Goodbye! 😊 Take care and stay positive."

  utter_motivation:
    - text: "Believe in yourself. Every step you take brings you closer to your goal 💪"

  utter_inspiration:
    - text: "The best way to predict the future is to create it ✨"

  utter_success:
    - text: "Success comes to those who work hard and never give up 🚀"

  utter_funny:
    - text: "Why don’t programmers like nature? 🌿 Too many bugs 😄"

session_config:
  session_expiration_time: 60
  carry_over_slots_to_new_session: true